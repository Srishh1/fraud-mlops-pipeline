# docker-compose.yml — Week 5: Full stack including Airflow
#
# SERVICES:
#   fraud-api   → FastAPI server      → http://localhost:8000/docs
#   mlflow      → Experiment tracking → http://localhost:5000
#   airflow     → Pipeline scheduler  → http://localhost:8080  (admin/admin)
#   prometheus  → Metrics collector   → http://localhost:9090
#   grafana     → Dashboard UI        → http://localhost:3000  (admin/frauddetect123)
#
# START ALL:   docker-compose up -d
# STOP ALL:    docker-compose down
# LOGS:        docker-compose logs -f fraud-api
# REBUILD API: docker-compose up --build fraud-api -d

version: "3.9"

x-airflow-common: &airflow-common
  # Shared config for all Airflow services (webserver + scheduler)
  image: apache/airflow:2.9.1
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
    - AIRFLOW__CORE__FERNET_KEY=ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
    - AIRFLOW__WEBSERVER__SECRET_KEY=fraud-mlops-secret-key-change-in-prod
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK=true
    - MLFLOW_TRACKING_URI=http://mlflow:5000
    - PROJECT_ROOT=/opt/airflow
    - PYTHONPATH=/opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - ./models:/opt/airflow/models
    - airflow_logs:/opt/airflow/logs
  depends_on:
    - mlflow

services:

  # ── FastAPI Inference Server ──────────────────────────────
  fraud-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: fraud-api:latest
    container_name: fraud-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data
    environment:
      - MODEL_PATH=models/fraud_model_v1.joblib
      - FEATURE_NAMES_PATH=models/feature_names.json
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped
    depends_on:
      - mlflow

  # ── MLflow Tracking Server ────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
      - mlflow_db:/mlflow/db
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/db/mlflow.db
      --default-artifact-root /mlflow/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Airflow Init (runs once, sets up DB + admin user) ────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@fraudmlops.local || true
        echo "✅ Airflow initialised"
    restart: "no"   # run once and exit

  # ── Airflow Webserver ──────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      - airflow-init

  # ── Airflow Scheduler ─────────────────────────────────────
  # The scheduler reads DAG files, decides when tasks should run,
  # and queues them for the executor.
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      - airflow-init

  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=14d'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=frauddetect123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/fraud_dashboard.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana_provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana_dashboard.json:/etc/grafana/provisioning/dashboards/fraud_dashboard.json
    depends_on:
      - prometheus
    restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────
volumes:
  mlflow_artifacts:
  mlflow_db:
  airflow_logs:
  prometheus_data:
  grafana_data: